name: Update rejected patterns

on:
  schedule:
    # Run every Monday at 00:00 UTC
    - cron: "0 0 * * 1"
  workflow_dispatch: # Allows manual trigger

jobs:
  update-rejected-patterns:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Cache Prettier install
        uses: actions/cache@v4
        with:
          path: node_modules
          key: prettier-modules-${{ runner.os }}-3.6.2

      - name: Install Prettier
        run: npm install --save-dev prettier@3.6.2

      - name: Download rejected patterns
        run: ./scripts/download-rejected-patterns

      - name: Format files
        run: npx prettier --write "**/*.{css,html,json,yaml,yml}"

      - name: Check for changes
        id: changes
        run: |
          if ! git diff --exit-code config/rejected_patterns.yaml; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b update-rejected-patterns
          git add config/rejected_patterns.yaml
          git commit -m "Update rejected patterns" -m "Automated update of rejected patterns from source."
          git push -f origin update-rejected-patterns
          gh pr create \
            --title "Update rejected patterns" \
            --body "This PR updates the rejected patterns configuration file with the latest data from source." \
            --base main \
            --head update-rejected-patterns || echo "PR already exists"
